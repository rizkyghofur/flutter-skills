dart_skills_lint:
  rules:
    check-relative-paths: error
    check-absolute-paths: error
  directories:
    - path: ".agents/skills"
      rules:
        check-trailing-whitespace: error
      ignore_file: ".agents/skills/ignore.json"
    - path: "../../skills"
      ignore_file: ".agents/skills/flutter_skills_ignore.json"
    - path: "skills"
      rules:
        check-trailing-whitespace: error
