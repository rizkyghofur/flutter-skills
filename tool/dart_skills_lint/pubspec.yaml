name: dart_skills_lint
description: A static analysis linter for agent skills.
version: 0.2.0
repository: https://github.com/flutter/skills

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.4.0
  io: ^1.0.4
  logging: ^1.2.0
  meta: ^1.11.0
  path: ^1.9.1
  yaml: ^3.1.3
  json_annotation: ^4.8.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
  test_process: ^2.1.1
  json_serializable: ^6.7.0
  build_runner: ^2.4.0

executables:
  dart_skills_lint: cli
